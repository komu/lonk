product: jvm/lib
description: A simple database library for non-blocking Kotlin

settings:
  jvm:
    jdk:
      version: 21
    test:
      junitPlatformVersion: 6.1.1
  kotlin:
    version: 2.4.0
    freeCompilerArgs:
      - -Xreturn-value-checker=full
      - -Xexplicit-api=strict
  publishing:
    enabled: true
    group: dev.komu.lonk
    artifactId: lonk
    version: 0.0.0-SNAPSHOT
    mavenCentral:
      enabled: true
      publishingMode: auto
    signArtifacts: true
    publishSources: true
    pom:
      url: https://github.com/komu/lonk
      scm: https://github.com/komu/lonk.git
      developers:
        - name: Juha Komulainen
      licenses:
        - name: MIT
          url: https://opensource.org/license/mit

dependencies:
  - $kotlin.reflect
  - $libs.kotlinx.coroutines.core
  - $libs.kotlinx.coroutines.reactive
  - $libs.kotlinx.datetime: compile-only
  - $libs.jetbrains.annotations: compile-only
  - $libs.jdbc.postgresql: compile-only
  - $libs.r2dbc.postgresql: compile-only

test-dependencies:
  - $libs.junit.jupiter.api
  - $libs.junit.jupiter.params
  - $libs.jdbc.hsqldb
  - $libs.jdbc.postgresql
  - $libs.kotlinx.datetime
  - $libs.testcontainers.postgresql
  - $libs.r2dbc.postgresql
